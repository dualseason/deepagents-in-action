name: Optimize Assets

on:
  push:
    paths:
      - "public/**/*.png"
      - "public/**/*.jpg"
      - "public/**/*.jpeg"
      - "public/**/*.pdf"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install asset tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ghostscript file

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Identify changed assets
        id: changed-assets
        env:
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [[ -n "${BEFORE:-}" ]] \
            && [[ "$BEFORE" != "0000000000000000000000000000000000000000" ]] \
            && git cat-file -e "$BEFORE^{commit}" 2>/dev/null \
            && git merge-base --is-ancestor "$BEFORE" "$SHA"; then
            base="$BEFORE"
          else
            base="$(git merge-base "origin/$DEFAULT_BRANCH" "$SHA")"
          fi

          changed=()
          while IFS= read -r file; do
            case "$file" in
              public/*.png|public/*.jpg|public/*.jpeg|public/*.pdf)
                changed+=("$file")
                ;;
            esac
          done < <(git diff --name-only --diff-filter=AMR "$base" "$SHA" -- public)

          if (( ${#changed[@]} == 0 )); then
            echo "has_assets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "${changed[@]}" > "$RUNNER_TEMP/changed-assets.txt"
          echo "has_assets=true" >> "$GITHUB_OUTPUT"

      - name: Optimize changed assets
        if: steps.changed-assets.outputs.has_assets == 'true'
        run: |
          mapfile -t changed < "$RUNNER_TEMP/changed-assets.txt"
          bash scripts/optimize-assets.sh "${changed[@]}"

      - name: Commit optimized assets
        id: commit-assets
        run: |
          if git diff --quiet; then
            echo "No asset updates were needed."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public content src README.md CONTRIBUTING.md scripts package.json .github/workflows
          git commit -m "chore: optimize assets"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Run asset check for optimized commit
        if: steps.commit-assets.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run assets-check.yml --ref "$GITHUB_REF_NAME"
