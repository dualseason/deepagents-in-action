name: Asset Check

on:
  pull_request:
    paths:
      - "public/**/*.png"
      - "public/**/*.jpg"
      - "public/**/*.jpeg"
      - "public/**/*.pdf"
      - "content/**"
      - "src/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "scripts/optimize-assets.sh"
      - "scripts/validate-assets.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/assets-check.yml"
      - ".github/workflows/optimize-assets.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Validate asset metadata
        run: npm run assets:check
